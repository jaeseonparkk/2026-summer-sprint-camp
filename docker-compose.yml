services:

  apache:
    build: .
    container_name: apache
    ports:
      - "80:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11
    container_name: mariadb

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 73459375298375
      MYSQL_DATABASE: secure_web

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: